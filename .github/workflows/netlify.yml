name: Build and Deploy to Netlify # 워크플로우 이름
on:
  push:
    branches:
      - main # main 브랜치에 push될 때 실행
  pull_request:
    branches:
      - main # main 브랜치로 PR 생성되거나 업데이트될 때 실행

jobs:
  build: # 빌드 작업
    runs-on: ubuntu-latest # 최신 우분투 환경에서 실행
    timeout-minutes: 10 # 10분 제한(넘어가면 빌드 실패)
    steps: # 아래 단계를 거쳐라
      - uses: actions/checkout@v4 # 레포 체크아웃(코드 가져오기)

      - name: Install dependencies # 프로젝트 의존성 설치
        run: npm install

      - name: Build project # 프로젝트 빌드 실행
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{secrets.VITE_API_BASE_URL}}
          VITE_KAKAO_MAP_KEY: ${{secrets.VITE_KAKAO_MAP_KEY}}
      - name: Upload build artifact # 빌드 결과물(dist 폴더)을 artifact로 업로드해라
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  deploy: # 배포 작업
    runs-on: ubuntu-latest # 최신 우분투 환경에서 실행
    timeout-minutes: 5 # 5분 제한(넘어가면 배포 실패)
    needs: build # 빌드 작업이 성공적으로 끝나야 실행
    steps:
      - name: Download build artifact # 빌드 후 업로드한 dist artifact 다운
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Deploy to Netlify # Netlify로 배포
        uses: nwtgck/actions-netlify@v2.0
        with:
          publish-dir: './dist' # 배포할 폴더 경로
          production-branch: main # 배포 기준 브랜치명
          github-token: ${{ secrets.GITHUB_TOKEN }} # 깃허브 인증 토큰(매 배포 시마다 자동 생성/삽입됨)
          deploy-message: '🚀 [Deploy] ${{ github.head_ref || github.ref_name }}: ${{ github.event.head_commit.message }}' # 배포 메시지
          enable-pull-request-comment: true # PR 배포 결과 댓글 추가할건지
          enable-commit-comment: true # 커밋 배포 결과 댓글 추가할건지
          overwrites-pull-request-comment: true # 기존 PR 댓글 덮어쓰기
        env: # Netlify 관련 환경변수 정의
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }} # Netlify 인증 토큰
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }} # Netlify 프로젝트 ID
